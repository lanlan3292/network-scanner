name: Translation check

on:
  push:
    branches: [ main ]
    paths:
      - 'app/src/main/res/values*/strings.xml'
      - 'scripts/translation-status.sh'
      - 'README.md'

permissions:
  contents: read

jobs:
  check:
    name: Check translation table
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify README translation table is up to date
        run: bash scripts/translation-status.sh --check
